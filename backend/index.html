<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Goa Heritage Assistant</title>

<!-- Markdown Parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- HTML Sanitizer -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#e0f2fe,#fefce8);
    font-family:"Segoe UI", Arial, sans-serif;
    padding:40px;
}

.phone-glow{
    position:absolute;
    width:360px;
    height:720px;
    background:radial-gradient(circle at top,#38bdf8,transparent 60%);
    filter:blur(60px);
    animation:glow 4s ease-in-out infinite alternate;
}
@keyframes glow{
    from{opacity:0.4}
    to{opacity:0.8}
}

.phone{
    width:320px;
    height:640px;
    background:#000;
    border-radius:36px;
    padding:10px;
    box-shadow:0 28px 55px rgba(0,0,0,0.35);
    position:relative;
    z-index:2;
}
.phone::before{
    content:"";
    position:absolute;
    top:6px;
    left:50%;
    transform:translateX(-50%);
    width:90px;
    height:5px;
    background:#111;
    border-radius:8px;
}

.screen{
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#e0f2fe,#fefce8);
    border-radius:26px;
    overflow:hidden;
}

.chat-container{
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(10px);
    display:flex;
    flex-direction:column;
}

.chat-header{
    padding:14px;
    text-align:center;
    border-bottom:1px solid rgba(0,0,0,0.1);
}
.chat-header h2{
    margin:0;
    font-size:16px;
    color:#0f172a;
}
.chat-header p{
    margin-top:4px;
    font-size:11px;
    color:#475569;
}

.chat-box{
    flex:1;
    padding:12px;
    overflow-y:auto;
}

.message{
    max-width:80%;
    padding:10px 12px;
    margin-bottom:8px;
    font-size:13px;
    line-height:1.5;
    border-radius:12px;
    animation:pop 0.35s ease-out;
}

@keyframes pop{
    from{transform:translateY(10px) scale(.95);opacity:0;}
    to{transform:translateY(0) scale(1);opacity:1;}
}

.user{
    background:linear-gradient(135deg,#38bdf8,#2563eb);
    color:#fff;
    margin-left:auto;
}

.bot{
    background:#f1f5f9;
    color:#0f172a;
}

/* Markdown Styling */
.message p{margin:6px 0;}
.message ul{padding-left:18px;margin:6px 0;}
.message li{margin-bottom:4px;}

.message code{
    background:#0f172a;
    color:#f8fafc;
    padding:2px 6px;
    border-radius:6px;
    font-size:12px;
}

.message pre{
    background:#0f172a;
    color:#f8fafc;
    padding:10px;
    border-radius:10px;
    overflow-x:auto;
}

.typing{
    display:flex;
    gap:4px;
    padding:10px;
}
.dot{
    width:6px;
    height:6px;
    background:#64748b;
    border-radius:50%;
    animation:bounce 1.2s infinite;
}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}

@keyframes bounce{
    0%,80%,100%{transform:scale(0)}
    40%{transform:scale(1)}
}

.chat-input{
    display:flex;
    padding:10px;
    gap:6px;
    border-top:1px solid rgba(0,0,0,0.1);
}
.chat-input input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:1px solid #cbd5f5;
    font-size:13px;
    outline:none;
}
.chat-input button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#38bdf8,#2563eb);
    color:#fff;
    font-weight:600;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="phone-glow"></div>

<div class="phone">
<div class="screen">
<div class="chat-container">

<div class="chat-header">
<h2>Goa Heritage Assistant</h2>
<p>Archaeology • Hidden Sites • History</p>
</div>

<!-- EMPTY (important fix) -->
<div class="chat-box" id="chatBox"></div>

<div class="chat-input">
<input id="userInput" placeholder="Ask about any Goan site..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>
</div>
</div>

<script>
const API_URL = "http://127.0.0.1:9000/query";
let KNOWLEDGE_ID = "goa";
let USER_ID = "admin";

/* Markdown renderer */
function renderMarkdown(text){
    const rawHTML = marked.parse(text);
    return DOMPurify.sanitize(rawHTML);
}

function addMessage(text,type){
    const box = document.getElementById("chatBox");

    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerHTML = renderMarkdown(text);

    box.appendChild(msg);
    box.scrollTop = box.scrollHeight;
}

function showTyping(){
    const box = document.getElementById("chatBox");

    const typing = document.createElement("div");
    typing.className = "message bot typing";
    typing.innerHTML = `
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    `;

    box.appendChild(typing);
    box.scrollTop = box.scrollHeight;
    return typing;
}

async function sendMessage(){
    const input = document.getElementById("userInput");
    const q = input.value.trim();
    if(!q) return;

    addMessage(q,"user");
    input.value="";

    const typing = showTyping();

    try{
        const res = await fetch(API_URL,{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({
                query:q,
                knowledge_id:KNOWLEDGE_ID,
                user_id:USER_ID
            })
        });

        const data = await res.json();

        typing.remove();
        addMessage(data.response,"bot");

    }catch(e){
        typing.remove();
        addMessage("⚠️ Server connection failed.","bot");
        console.error(e);
    }
}

/* ENTER key */
document.getElementById("userInput")
.addEventListener("keypress",e=>{
    if(e.key==="Enter") sendMessage();
});

/* ✅ Initial Markdown Message */
window.onload = () => {
    addMessage(
`👋 Welcome to **Goa Heritage Assistant**

Ask about:

- 🏰 Forts  
- ⛪ Churches  
- 🛕 Temples  
- 🗿 Ruins  
- 🌿 Hidden archaeological sites

Try asking: *"Tell me about Aguada Fort"*`,
"bot");
};
</script>

</body>
</html>
